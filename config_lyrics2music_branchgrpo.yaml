experiment:
  name: lyrics_dance2music_branchgrpo
  seed: 42
  output_dir: /home/anam/dance2music/BranchGRPO/outputs/lyrics_dance2music_branchgrpo

paths:
  # Original dataset/model/metric source path from shared_codebase.
  shared_codebase_root: /home/anam/dance2music/shared_codebase
  train_npz_dir: /home/anam/dance2music/shared_codebase/npz_split/train
  val_npz_dir: /home/anam/dance2music/shared_codebase/npz_split/val
  test_npz_dir: /home/anam/dance2music/shared_codebase/npz_split/test

train:
  device: cuda
  num_workers: 2
  batch_size: 1
  epochs: 20
  max_steps: 20000
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  save_every_steps: 500
  log_every_steps: 10
  ppo_epochs: 1
  clip_range: 0.2
  kl_beta: 0.0
  grad_checkpointing: true   # recompute UNet activations in backward to cut memory at high rollout_steps
  # GRPO policy initialization: pretrained checkpoint (EMA weights + mel stats reused).
  init_checkpoint: /home/anam/dance2music/shared_codebase/checkpoints_exact/ckpt_final_none.pt
  ema_decay: 0.9998

branchgrpo:
  # Tree mechanics
  num_generations: 2
  diffusion_timesteps: 1000
  rollout_steps: 1000
  tree_split_points: [990]
  # Paper's s: 0 gives identical siblings; larger values approach independence.
  branch_correlation: 4.0
  tree_prob_weighted: false
  advantage_clip: 5.0
  advantage_scale: 1.0

  # Pruning controls (applied after rewards/advantages, for backprop only)
  width_pruning_mode: none   # none, parent_top1, or extreme
  width_pruning_extreme_b: 1 # extreme keeps global best b and worst b leaves
  depth_pruning: []          # individual edge depths to exclude from backprop
  # Split step 990 creates children at depth 991. Skip the shared, zero-signal prefix.
  depth_pruning_ranges: [[1, 990]] # inclusive [start_depth, end_depth] ranges

model:
  cond_dim: 128
  base_dim: 256
  dim_mults: [1, 2, 4]
  time_emb_dim: 256
  num_res_blocks: 2
  mid_blocks: 3
  attn_heads: 8

reward:
  sample_rate: 22050
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  n_mels: 80
  griffin_lim_iters: 32
  mfcc_n: 40
  # reward = w_fad * score_fad + w_mfcc * score_mfcc
  w_fad: 1.0
  w_mfcc: 0.0

eval:
  eval_every_steps: 100
  bigvgan_dir: /home/anam/dance2music/shared_codebase/BigVGAN
  max_test_samples: 5
  # Total test samples: 197
  eval_dir: /home/anam/dance2music/BranchGRPO/outputs/lyrics_dance2music_branchgrpo/evaluation
  results_dir: /home/anam/dance2music/BranchGRPO/outputs/lyrics_dance2music_branchgrpo/results